<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ミュージックキーボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet">
    <style>
        body { touch-action: manipulation; } /* ズームやスクロールの誤動作を防止 */
        
        #keyboard-container {
            position: relative;
            height: 220px;
            display: flex;
            user-select: none;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .key-white {
            flex: 1 1 0%;
            min-width: 0;
            border: 1px solid #cbd5e1;
            border-radius: 0 0 5px 5px;
            background: linear-gradient(to bottom, #ffffff 0%, #f1f5f9 100%);
            position: relative;
            z-index: 1;
            box-shadow: inset 0 0 3px rgba(0,0,0,0.1), 0 2px 2px rgba(0,0,0,0.1);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 15px;
            cursor: pointer;
            transition: background 0.05s, transform 0.05s, box-shadow 0.05s;
            overflow: hidden;
        }

        /* 白鍵を押したときのスタイル（青く太い枠線） */
        .key-white.active {
            background: #e2e8f0;
            /* insetを使って内側に太い枠線を描画し、レイアウト崩れを防ぐ */
            box-shadow: inset 0 0 0 3px #3b82f6, inset 0 2px 4px rgba(0,0,0,0.2);
            transform: translateY(1px);
            z-index: 10;
        }

        .key-black {
            position: absolute;
            height: 60%;
            background: linear-gradient(to bottom, #334155 0%, #0f172a 100%);
            z-index: 2;
            border-radius: 0 0 4px 4px;
            border: 1px solid #000;
            box-shadow: inset 0 0 4px rgba(255,255,255,0.2), 2px 2px 3px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: background 0.05s, transform 0.05s, box-shadow 0.05s;
        }

        /* 黒鍵を押したときのスタイル（青く太い枠線） */
        .key-black.active {
            background: #1e293b;
            box-shadow: inset 0 0 0 3px #3b82f6, inset 0 2px 4px rgba(0,0,0,0.5);
            transform: translateY(1px);
            z-index: 10;
        }

        /* 次に押すべき鍵盤の黄色ハイライト */
        .key-white.practice-target {
            background: #fef08a !important; /* 明るい黄色 */
        }
        .key-black.practice-target {
            background: #eab308 !important; /* 少し暗めの黄色（黒鍵用） */
            border-color: #ca8a04 !important;
        }

        .note-label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #64748b;
            pointer-events: none;
            user-select: none;
            display: none;
        }

        .show-labels .note-label {
            display: block;
        }

        .practice-mark {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            pointer-events: none;
            z-index: 10;
            color: #ef4444;
            font-weight: bold;
            text-shadow: 0 0 2px white;
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }
        .key-black .practice-mark {
            color: #f87171;
            bottom: 10px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 180px;
            background-color: #fdfbf7;
            border-radius: 8px 8px 0 0;
            border-bottom: 2px solid #e2e8f0;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-2 md:p-6 min-h-screen flex flex-col items-center">

    <div style="position: absolute; top: -9999px; font-family: 'Noto Music', serif; visibility: hidden;">𝄞 𝄢</div>

    <div class="w-full max-w-5xl bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

                    <div class="flex gap-2">

            <p class="text-center text-xs text-slate-500 mt-4">
                PCキーボード（下段: Z〜M, 上段: Q〜U）または画面タッチ・クリックで演奏できます。

        <div class="relative border-b border-slate-300">

        <div class="bg-white pt-3 pb-1 border-b border-slate-200">

                        <div class="w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-t-[10px] border-t-blue-600 filter drop-shadow"></div>
                    </div>
                    <div id="range-thumb-right" class="absolute top-0 w-8 h-8 cursor-ew-resize flex justify-center items-center -ml-4 z-10 touch-none">
                        <div class="w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-t-[10px] border-t-blue-600 filter drop-shadow"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="keyboard-container" class="show-labels">
            <!-- JavaScriptで動的に生成されます -->
        </div>

    </div>

    <script>
        let startNote = 48;
        let endNote = 84;
        let numKeys = endNote - startNote + 1;
        const MIN_MIDI = 21;
        const MAX_MIDI = 108;
        
        let audioCtx = null;
        const activeNotes = new Map();
        const activeUINotes = new Set();

        let currentInstrument = 'synth';
        let currentTranspose = 0;
        let octaveShift = 0;
        let preferFlat = false;

        let isPracticing = false;
        let practiceSongData = [];
        let practiceStep = 0;
        
        // 校歌のメロディデータ（ニ長調: +2シフト済みの実音）
        const songs = {
            koyo1: [
                57, 66, 64, 62, 66, 69, 66, 69, 71, 69, 66, 64,
                66, 66, 64, 62, 64, 62, 59, 59, 57, 62, 64, 66, 62,
                64, 64, 57, 57, 66, 64, 62, 66, 69, 74, 73, 71, 69,
                69, 74, 74, 69, 66, 71, 69, 67, 66, 64, 62, 64, 66,
                69, 74, 69, 66, 71, 69, 67, 66, 62, 64, 64, 62,
                57, 62, 62, 66, 66, 69, 66, 69, 74, 73, 71, 74, 69,
                69, 74, 69, 71, 69, 66, 62, 64, 66, 64, 64, 62
            ],
            koyo2: [
                57, 66, 64, 62, 66, 69, 66, 69, 71, 69, 66, 64,
                66, 66, 64, 62, 64, 62, 59, 59, 57, 62, 64, 66, 62,
                64, 64, 57, 57, 66, 64, 62, 66, 69, 74, 73, 71, 69,
                69, 74, 74, 69, 66, 71, 69, 67, 66, 64, 62, 64, 66,
                69, 74, 69, 66, 71, 71, 69, 67, 66, 62, 64, 64, 62,
                57, 62, 62, 66, 66, 69, 66, 69, 74, 73, 71, 74, 69,
                69, 74, 69, 71, 69, 66, 62, 64, 66, 64, 64, 62
            ]
        };
        const songsLyrics = {
            koyo1: [
                "あ", "け", "ゆ", "く", "せ", "い", "き", "れ", "い", "ろ", "う", "と",
                "く", "ま", "の", "の", "う", "み", "に", "の", "ぼ", "ー", "る", "ひ", "を",
                "つ", "ね", "に", "あ", "お", "ぎ", "て", "た", "ゆ", "ー", "み", "な", "く",
                "ち", "と", "く", "を", "み", "が", "き", "み", "を", "ー", "き", "た", "え",
                "き", "ぼう", "に", "も", "ゆ", "る", "わ", "が", "ー", "こ", "う", "しゃ",
                "み", "よ", "み", "わ", "さ", "き", "に", "ひ", "か", "ー", "り", "た", "つ",
                "こ", "こ", "ぞ", "こ", "う", "ー", "よ", "う", "ちゅう", "が", "っ", "こう"
            ],
            koyo2: [
                "き", "しゅ", "う", "の", "さ", "ん", "が", "く", "も", "は", "れ", "て",
                "へ", "い", "わ", "の", "か", "ね", "の", "な", "る", "ー", "と", "こ", "ろ",
                "ま", "ど", "い", "た", "の", "し", "き", "が", "く", "ー", "え", "ん", "に",
                "せ", "か", "い", "を", "む", "す", "ぶ", "きょ", "う", "ー", "い", "く", "の",
                "り", "そ", "う", "は", "な", "さ", "く", "こ", "の", "ー", "ひ", "か", "り",
                "あ", "あ", "ま", "ゆ", "あ", "げ", "て", "た", "か", "ー", "ら", "か", "に",
                "う", "た", "え", "こ", "う", "ー", "よ", "う", "ちゅう", "が", "っ", "こう"
            ]
        };
        const songsTranspose = {
            koyo1: 2,  // ニ長調 (+2)
            koyo2: 2   // ニ長調 (+2)
        };

        const instruments = {
            synth: { type1: 'sawtooth', type2: 'square', detune: -10, attack: 0.1, decay: 0.3, sustain: 0.5, release: 0.5, filterFreq: 1500 },
            organ: { type1: 'sine', type2: 'sine', detune: 1200, attack: 0.02, decay: 0.1, sustain: 0.8, release: 0.1, filterFreq: 5000 },
            epiano: { type1: 'sine', type2: 'triangle', detune: 5, attack: 0.02, decay: 2.0, sustain: 0.4, release: 0.8, filterFreq: 2000 },
            famicom: { type1: 'square', type2: 'square', detune: 0, attack: 0.01, decay: 0.5, sustain: 0.2, release: 0.4, filterFreq: 8000 }
        };

        const keyMap = {
            'z': 0, 's': 1, 'x': 2, 'd': 3, 'c': 4, 'v': 5, 'g': 6, 'b': 7, 'h': 8, 'n': 9, 'j': 10, 'm': 11, ',': 12, 'l': 13, '.': 14, ';': 15, '/': 16,
            'q': 12, '2': 13, 'w': 14, '3': 15, 'e': 16, 'r': 17, '5': 18, 't': 19, '6': 20, 'y': 21, '7': 22, 'u': 23, 'i': 24, '9': 25, 'o': 26, '0': 27, 'p': 28, '-': 29, '[': 30, '=': 31, ']': 32
        };

        const keySignatures = {
            "0": { type: null, notes: [] },
            "-5": { type: '#', notes: ['F'] },
            "2": { type: '#', notes: ['F', 'C'] },
            "-3": { type: '#', notes: ['F', 'C', 'G'] },
            "4": { type: '#', notes: ['F', 'C', 'G', 'D'] },
            "-1": { type: '#', notes: ['F', 'C', 'G', 'D', 'A'] },
            "-6": { type: '#', notes: ['F', 'C', 'G', 'D', 'A', 'E'] },
            "5": { type: 'b', notes: ['B'] },
            "-2": { type: 'b', notes: ['B', 'E'] },
            "3": { type: 'b', notes: ['B', 'E', 'A'] },
            "-4": { type: 'b', notes: ['B', 'E', 'A', 'D'] },
            "1": { type: 'b', notes: ['B', 'E', 'A', 'D', 'G'] }
        };

        const solfegeLabels = ['ド', '', 'レ', '', 'ミ', 'ファ', '', 'ソ', '', 'ラ', '', 'シ'];

        const keyboardContainer = document.getElementById('keyboard-container');
        const instrumentSelect = document.getElementById('instrument-select');
        const transposeSelect = document.getElementById('transpose-select');
        const showLabelsCheckbox = document.getElementById('show-labels');
        const octaveUpBtn = document.getElementById('octave-up');
        const octaveDownBtn = document.getElementById('octave-down');
        const octaveDisplay = document.getElementById('octave-display');
        const radioAccidentals = document.getElementsByName('accidental');
        const canvas = document.getElementById('staff-canvas');
        const ctx = canvas.getContext('2d');
        
        const sliderContainer = document.getElementById('range-slider-container');
        const thumbLeft = document.getElementById('range-thumb-left');
        const thumbRight = document.getElementById('range-thumb-right');
        const rangeTrack = document.getElementById('range-track');

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function noteToFreq(note) { return 440 * Math.pow(2, (note - 69) / 12); }

        function playSound(midiNote) {
            initAudio();
            const inst = instruments[currentInstrument];
            const freq = noteToFreq(midiNote);

            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const filter = audioCtx.createBiquadFilter();
            const gainNode = audioCtx.createGain();

            osc1.type = inst.type1;
            osc2.type = inst.type2;
            osc1.frequency.value = freq;
            osc2.frequency.value = freq;
            osc2.detune.value = inst.detune;

            filter.type = 'lowpass';
            filter.frequency.value = inst.filterFreq;

            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.5, now + inst.attack);
            gainNode.gain.linearRampToValueAtTime(0.5 * inst.sustain, now + inst.attack + inst.decay);

            osc1.start(now);
            osc2.start(now);

            return { osc1, osc2, gainNode };
        }

        function stopSound(soundObj) {
            if (!soundObj || !audioCtx) return;
            const inst = instruments[currentInstrument];
            const now = audioCtx.currentTime;
            const gain = soundObj.gainNode.gain;
            
            gain.cancelScheduledValues(now);
            gain.setValueAtTime(gain.value, now);
            gain.exponentialRampToValueAtTime(0.001, now + inst.release);
            
            soundObj.osc1.stop(now + inst.release + 0.1);
            soundObj.osc2.stop(now + inst.release + 0.1);
        }

        function noteOn(baseMidi) {
            if (activeUINotes.has(baseMidi)) return;
            activeUINotes.add(baseMidi);

            const keyIndex = baseMidi - startNote;
            if (keyIndex >= 0 && keyIndex < numKeys) {
                const keyEl = document.getElementById(`key-${keyIndex}`);
                // CSSの.activeにより青く太い枠線が表示されます
                if (keyEl) keyEl.classList.add('active');
            }

            if (isPracticing) {
                const targetBaseMidi = practiceSongData[practiceStep] - currentTranspose - (octaveShift * 12);
                if (baseMidi === targetBaseMidi) {
                    practiceStep++;
                    updatePracticeUI();
                    if (practiceStep >= practiceSongData.length) finishPractice();
                }
            }

            const actualNote = baseMidi + (octaveShift * 12) + currentTranspose;
            if (actualNote >= 0 && actualNote <= 127) {
                const sound = playSound(actualNote);
                activeNotes.set(baseMidi, { actualNote, sound });
                requestAnimationFrame(drawStaff);
            }
        }

        function noteOff(baseMidi) {
            if (!activeUINotes.has(baseMidi)) return;
            activeUINotes.delete(baseMidi);

            const keyIndex = baseMidi - startNote;
            if (keyIndex >= 0 && keyIndex < numKeys) {
                const keyEl = document.getElementById(`key-${keyIndex}`);
                if (keyEl) keyEl.classList.remove('active');
            }

            const noteData = activeNotes.get(baseMidi);
            if (noteData) {
                stopSound(noteData.sound);
                activeNotes.delete(baseMidi);
                requestAnimationFrame(drawStaff);
            }
        }

        function createKeyboard() {
            keyboardContainer.innerHTML = '';
            let whiteKeyCount = 0;

            for (let i = 0; i < numKeys; i++) {
                const noteClass = (startNote + i) % 12;
                if ([0, 2, 4, 5, 7, 9, 11].includes(noteClass)) whiteKeyCount++;
            }

            const whiteKeyWidthPercent = 100 / whiteKeyCount;
            const blackKeyWidthPercent = whiteKeyWidthPercent * 0.65;
            let currentWhiteIdx = 0;
            
            for (let i = 0; i < numKeys; i++) {
                const noteClass = (startNote + i) % 12;
                const isBlack = [1, 3, 6, 8, 10].includes(noteClass);
                const baseMidi = startNote + i;
                
                const key = document.createElement('div');
                key.id = `key-${i}`;
                key.dataset.index = i;
                const activeClass = activeUINotes.has(baseMidi) ? ' active' : '';

                if (!isBlack) {
                    key.className = 'key-white' + activeClass;
                    const label = document.createElement('span');
                    label.className = 'note-label';
                    label.innerText = solfegeLabels[noteClass];
                    if (whiteKeyWidthPercent < 2) label.style.fontSize = '0.5rem';
                    key.appendChild(label);
                    currentWhiteIdx++;
                } else {
                    key.className = 'key-black' + activeClass;
                    const leftPercent = (currentWhiteIdx / whiteKeyCount) * 100;
                    key.style.width = `${blackKeyWidthPercent}%`;
                    key.style.left = `${leftPercent - (blackKeyWidthPercent / 2)}%`;
                }
                keyboardContainer.appendChild(key);
            }
            if (isPracticing) updatePracticeUI();
        }

        const btnPracticeStart = document.getElementById('btn-practice-start');
        const btnPracticeStop = document.getElementById('btn-practice-stop');
        const selectPracticeSong = document.getElementById('practice-song');
        const practiceStatus = document.getElementById('practice-status');
        const checkboxShowNext = document.getElementById('practice-show-next');
        const checkboxShowLyrics = document.getElementById('practice-show-lyrics');

        function applySongTranspose(songKey) {
            if (!songKey) return;
            const targetTranspose = songsTranspose[songKey];
            if (targetTranspose !== undefined && currentTranspose !== targetTranspose) {
                transposeSelect.value = targetTranspose.toString();
                transposeSelect.dispatchEvent(new Event('change'));
            }
        }

        selectPracticeSong.addEventListener('change', (e) => applySongTranspose(e.target.value));
        checkboxShowNext.addEventListener('change', () => { if(isPracticing) updatePracticeUI(); });
        checkboxShowLyrics.addEventListener('change', () => { if(isPracticing) updatePracticeUI(); });

        function checkAndExpandRangeForPractice() {
            if (!isPracticing || practiceSongData.length === 0) return;
            let reqMin = 127, reqMax = 0;
            practiceSongData.forEach(note => {
                const targetMidi = note - currentTranspose - (octaveShift * 12);
                if (targetMidi < reqMin) reqMin = targetMidi;
                if (targetMidi > reqMax) reqMax = targetMidi;
            });

            if (startNote > reqMin || endNote < reqMax) {
                startNote = Math.max(MIN_MIDI, Math.min(startNote, reqMin - 4));
                endNote = Math.min(MAX_MIDI, Math.max(endNote, reqMax + 5));
                numKeys = endNote - startNote + 1;
                updateSliderUI();
                createKeyboard();
            } else {
                updatePracticeUI();
            }
        }

        function startPractice() {
            const songKey = selectPracticeSong.value;
            if (!songKey) { alert("曲を選択して下さい。"); return; }
            practiceSongData = songs[songKey];
            practiceStep = 0;
            isPracticing = true;
            btnPracticeStart.classList.add('hidden');
            btnPracticeStop.classList.remove('hidden');
            practiceStatus.innerText = '練習中... 黄色く光る鍵盤を弾いてください';
            checkAndExpandRangeForPractice();
        }

        function stopPractice() {
            isPracticing = false;
            btnPracticeStart.classList.remove('hidden');
            btnPracticeStop.classList.add('hidden');
            practiceStatus.innerText = '';
            updatePracticeUI();
        }

        function finishPractice() {
            isPracticing = false;
            btnPracticeStart.classList.remove('hidden');
            btnPracticeStop.classList.add('hidden');
            practiceStatus.innerText = 'クリア！おめでとうございます！';
            updatePracticeUI();
            playApplause();
        }

        function updatePracticeUI() {
            // リセット
            document.querySelectorAll('.practice-mark').forEach(el => el.remove());
            document.querySelectorAll('.practice-target').forEach(el => el.classList.remove('practice-target'));
            
            if (!isPracticing) return;

            const songKey = selectPracticeSong.value;
            const songLyrics = songsLyrics[songKey];
            const showNext = checkboxShowNext.checked;
            const showLyrics = checkboxShowLyrics.checked;

            // 現在弾くべき音(◎)
            if (practiceStep < practiceSongData.length) {
                const currentNote = practiceSongData[practiceStep];
                const targetBaseMidi = currentNote - currentTranspose - (octaveShift * 12);
                const keyIdx = targetBaseMidi - startNote;
                
                if (keyIdx >= 0 && keyIdx < numKeys) {
                    const keyEl = document.getElementById(`key-${keyIdx}`);
                    if (keyEl) {
                        // 鍵盤自体を黄色に光らせる
                        keyEl.classList.add('practice-target');

                        const mark = document.createElement('div');
                        mark.className = 'practice-mark';
                        let lyricHtml = '';
                        if (showLyrics && songLyrics && songLyrics[practiceStep]) {
                            lyricHtml = `<span class="text-[0.65rem] text-red-600 mt-1">${songLyrics[practiceStep]}</span>`;
                        }
                        mark.innerHTML = `<span>◎</span>${lyricHtml}`;
                        keyEl.appendChild(mark);
                    }
                }
            }

            // 次に弾くべき音(◯)
            if (showNext && practiceStep + 1 < practiceSongData.length) {
                const nextNote = practiceSongData[practiceStep + 1];
                const targetBaseMidi = nextNote - currentTranspose - (octaveShift * 12);
                const keyIdx = targetBaseMidi - startNote;
                if (nextNote !== practiceSongData[practiceStep] && keyIdx >= 0 && keyIdx < numKeys) {
                    const keyEl = document.getElementById(`key-${keyIdx}`);
                    if (keyEl) {
                        const mark = document.createElement('div');
                        mark.className = 'practice-mark';
                        mark.style.opacity = '0.5';
                        let lyricHtml = '';
                        if (showLyrics && songLyrics && songLyrics[practiceStep + 1]) {
                            lyricHtml = `<span class="text-[0.65rem] text-red-600 mt-1">${songLyrics[practiceStep + 1]}</span>`;
                        }
                        mark.innerHTML = `<span>◯</span>${lyricHtml}`;
                        keyEl.appendChild(mark);
                    }
                }
            }
        }

        function playApplause() {
            initAudio();
            const duration = 2.5, count = 60;
            for (let i = 0; i < count; i++) {
                const time = audioCtx.currentTime + Math.random() * duration;
                const bufferSize = audioCtx.sampleRate * 0.15;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let j = 0; j < bufferSize; j++) data[j] = Math.random() * 2 - 1;
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1200 + Math.random() * 800;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(0.3 * Math.random(), time + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                noise.start(time);
            }
        }

        btnPracticeStart.addEventListener('click', startPractice);
        btnPracticeStop.addEventListener('click', stopPractice);

        let activeThumb = null, trackDragStartX = 0, trackDragStartNote = 0, trackDragEndNote = 0;

        function updateSliderUI() {
            const leftPercent = ((startNote - MIN_MIDI) / (MAX_MIDI - MIN_MIDI)) * 100;
            const rightPercent = ((endNote - MIN_MIDI) / (MAX_MIDI - MIN_MIDI)) * 100;
            thumbLeft.style.left = `${leftPercent}%`;
            thumbRight.style.left = `${rightPercent}%`;
            rangeTrack.style.left = `${leftPercent}%`;
            rangeTrack.style.width = `${rightPercent - leftPercent}%`;
        }

        function getNoteFromX(clientX) {
            const innerContainer = document.querySelector('#range-slider-container > div');
            const rect = innerContainer.getBoundingClientRect();
            let percent = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            return Math.round(MIN_MIDI + percent * (MAX_MIDI - MIN_MIDI));
        }

        function handleThumbDown(e, thumb) {
            e.preventDefault();
            activeThumb = thumb;
            if (thumb === 'track') {
                trackDragStartX = e.clientX || (e.changedTouches ? e.changedTouches[0].clientX : 0);
                trackDragStartNote = startNote;
                trackDragEndNote = endNote;
            }
        }

        thumbLeft.addEventListener('mousedown', (e) => handleThumbDown(e, 'left'));
        thumbRight.addEventListener('mousedown', (e) => handleThumbDown(e, 'right'));
        rangeTrack.addEventListener('mousedown', (e) => handleThumbDown(e, 'track'));
        thumbLeft.addEventListener('touchstart', (e) => handleThumbDown(e, 'left'), {passive: false});
        thumbRight.addEventListener('touchstart', (e) => handleThumbDown(e, 'right'), {passive: false});
        rangeTrack.addEventListener('touchstart', (e) => handleThumbDown(e, 'track'), {passive: false});

        function handleThumbMove(clientX) {
            if (!activeThumb) return;
            if (activeThumb === 'track') {
                const innerContainer = document.querySelector('#range-slider-container > div');
                const deltaNote = Math.round(((clientX - trackDragStartX) / innerContainer.getBoundingClientRect().width) * (MAX_MIDI - MIN_MIDI));
                let newStart = trackDragStartNote + deltaNote, newEnd = trackDragEndNote + deltaNote;
                if (newStart < MIN_MIDI) { newStart = MIN_MIDI; newEnd = newStart + (trackDragEndNote - trackDragStartNote); }
                if (newEnd > MAX_MIDI) { newEnd = MAX_MIDI; newStart = newEnd - (trackDragEndNote - trackDragStartNote); }
                startNote = newStart; endNote = newEnd;
            } else {
                const note = getNoteFromX(clientX);
                if (activeThumb === 'left') startNote = Math.min(note, endNote - 11);
                else if (activeThumb === 'right') endNote = Math.max(note, startNote + 11);
            }
            numKeys = endNote - startNote + 1;
            updateSliderUI(); createKeyboard();
        }

        window.addEventListener('mousemove', (e) => { if (activeThumb) handleThumbMove(e.clientX); });
        window.addEventListener('touchmove', (e) => { if (activeThumb) handleThumbMove(e.changedTouches[0].clientX); }, {passive: false});
        const resetThumb = () => activeThumb = null;
        window.addEventListener('mouseup', resetThumb); window.addEventListener('touchend', resetThumb); window.addEventListener('touchcancel', resetThumb);

        let isDragging = false, currentTouchKeys = new Map();

        function getKeyBaseMidiFromEvent(e) {
            let el = e.target;
            if (e.type.startsWith('touch') && e.changedTouches.length > 0) el = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            if (el && el.id && el.id.startsWith('key-')) return startNote + parseInt(el.dataset.index, 10);
            return null;
        }

        keyboardContainer.addEventListener('mousedown', (e) => {
            isDragging = true; initAudio();
            const baseMidi = getKeyBaseMidiFromEvent(e);
            if (baseMidi !== null) noteOn(baseMidi);
        });
        window.addEventListener('mouseup', () => {
            isDragging = false; activeUINotes.forEach(baseMidi => noteOff(baseMidi));
        });
        keyboardContainer.addEventListener('mouseover', (e) => {
            if (isDragging) { const baseMidi = getKeyBaseMidiFromEvent(e); if (baseMidi !== null) noteOn(baseMidi); }
        });
        keyboardContainer.addEventListener('mouseout', (e) => {
            if (isDragging) { const baseMidi = getKeyBaseMidiFromEvent(e); if (baseMidi !== null) noteOff(baseMidi); }
        });

        keyboardContainer.addEventListener('touchstart', (e) => {
            e.preventDefault(); initAudio();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                if (el && el.id && el.id.startsWith('key-')) {
                    const baseMidi = startNote + parseInt(el.dataset.index, 10);
                    currentTouchKeys.set(touch.identifier, baseMidi);
                    noteOn(baseMidi);
                }
            }
        }, { passive: false });

        keyboardContainer.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                const prevMidi = currentTouchKeys.get(touch.identifier);
                let newMidi = (el && el.id && el.id.startsWith('key-')) ? startNote + parseInt(el.dataset.index, 10) : null;
                if (prevMidi !== newMidi) {
                    if (prevMidi !== null && prevMidi !== undefined) noteOff(prevMidi);
                    if (newMidi !== null) { currentTouchKeys.set(touch.identifier, newMidi); noteOn(newMidi); }
                    else currentTouchKeys.delete(touch.identifier);
                }
            }
        }, { passive: false });

        const handleTouchEnd = (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const baseMidi = currentTouchKeys.get(touch.identifier);
                if (baseMidi !== undefined && baseMidi !== null) { noteOff(baseMidi); currentTouchKeys.delete(touch.identifier); }
            }
        };
        keyboardContainer.addEventListener('touchend', handleTouchEnd, { passive: false });
        keyboardContainer.addEventListener('touchcancel', handleTouchEnd, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.repeat || e.ctrlKey || e.metaKey || e.altKey) return;
            const key = e.key.toLowerCase();
            if (keyMap.hasOwnProperty(key)) {
                const baseMidi = 48 + keyMap[key];
                if (baseMidi >= MIN_MIDI && baseMidi <= MAX_MIDI) { initAudio(); noteOn(baseMidi); }
            }
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keyMap.hasOwnProperty(key)) noteOff(48 + keyMap[key]);
        });

        instrumentSelect.addEventListener('change', (e) => currentInstrument = e.target.value);
        transposeSelect.addEventListener('change', (e) => {
            currentTranspose = parseInt(e.target.value, 10); requestAnimationFrame(drawStaff);
            if (isPracticing) checkAndExpandRangeForPractice();
        });
        showLabelsCheckbox.addEventListener('change', (e) => e.target.checked ? keyboardContainer.classList.add('show-labels') : keyboardContainer.classList.remove('show-labels'));
        Array.from(radioAccidentals).forEach(radio => radio.addEventListener('change', (e) => { preferFlat = (e.target.value === 'flat'); requestAnimationFrame(drawStaff); }));

        function updateOctave() { octaveDisplay.innerText = (octaveShift > 0 ? '+' : '') + octaveShift; }
        octaveUpBtn.addEventListener('click', () => { if (octaveShift < 2) { octaveShift++; updateOctave(); if (isPracticing) checkAndExpandRangeForPractice(); } });
        octaveDownBtn.addEventListener('click', () => { if (octaveShift > -2) { octaveShift--; updateOctave(); if (isPracticing) checkAndExpandRangeForPractice(); } });

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr; canvas.height = 180 * dpr;
            ctx.scale(dpr, dpr); canvas.style.width = `${rect.width}px`; canvas.style.height = `180px`;
            requestAnimationFrame(drawStaff);
        }
        window.addEventListener('resize', resizeCanvas);

        function getNoteDrawInfo(midiNote, useFlat) {
            const octave = Math.floor(midiNote / 12), noteClass = midiNote % 12;
            const sharpMap = [{ w: 0, a: null }, { w: 0, a: '#' }, { w: 1, a: null }, { w: 1, a: '#' }, { w: 2, a: null }, { w: 3, a: null }, { w: 3, a: '#' }, { w: 4, a: null }, { w: 4, a: '#' }, { w: 5, a: null }, { w: 5, a: '#' }, { w: 6, a: null }];
            const flatMap = [{ w: 0, a: null }, { w: 1, a: 'b' }, { w: 1, a: null }, { w: 2, a: 'b' }, { w: 2, a: null }, { w: 3, a: null }, { w: 4, a: 'b' }, { w: 4, a: null }, { w: 5, a: 'b' }, { w: 5, a: null }, { w: 6, a: 'b' }, { w: 6, a: null }];
            const mapInfo = useFlat ? flatMap[noteClass] : sharpMap[noteClass];
            return { idx: octave * 7 + mapInfo.w, acc: mapInfo.a, noteName: ['C','D','E','F','G','A','B'][mapInfo.w] };
        }

        function drawStaff() {
            const width = canvas.width / (window.devicePixelRatio || 1), height = 180;
            ctx.clearRect(0, 0, width, height);
            const lineSpacing = 10, halfSpace = lineSpacing / 2, centerY = height / 2, C4_IDX = 35, C4_Y = centerY;
            const getY = (idx) => C4_Y - (idx - C4_IDX) * halfSpace;

            ctx.strokeStyle = '#64748b'; ctx.lineWidth = 1; ctx.fillStyle = '#0f172a'; ctx.font = '32px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.beginPath();
            for (let i = 0; i < 5; i++) { const y = getY(45 - i * 2); ctx.moveTo(20, y); ctx.lineTo(width - 20, y); }
            for (let i = 0; i < 5; i++) { const y = getY(33 - i * 2); ctx.moveTo(20, y); ctx.lineTo(width - 20, y); }
            ctx.moveTo(20, getY(45)); ctx.lineTo(20, getY(25)); ctx.moveTo(width - 20, getY(45)); ctx.lineTo(width - 20, getY(25));
            ctx.stroke();

            ctx.font = '48px "Noto Music", serif'; ctx.fillText('𝄞', 40, getY(39) - 2); ctx.fillText('𝄢', 40, getY(31) + 20);

            const keySigData = keySignatures[currentTranspose.toString()];
            let sigStartX = 80;
            if (keySigData && keySigData.type) {
                ctx.font = '24px serif'; const isSharp = keySigData.type === '#';
                const trebleOffsets = { '#': { 'F': 45, 'C': 42, 'G': 46, 'D': 43, 'A': 40, 'E': 44, 'B': 41 }, 'b': { 'B': 41, 'E': 44, 'A': 40, 'D': 43, 'G': 39, 'C': 42, 'F': 38 } };
                const bassOffsets = { '#': { 'F': 31, 'C': 28, 'G': 32, 'D': 29, 'A': 26, 'E': 30, 'B': 27 }, 'b': { 'B': 27, 'E': 30, 'A': 26, 'D': 29, 'G': 25, 'C': 28, 'F': 24 } };
                keySigData.notes.forEach(noteName => {
                    const tIdx = trebleOffsets[keySigData.type][noteName], bIdx = bassOffsets[keySigData.type][noteName], sym = isSharp ? '♯' : '♭';
                    ctx.fillText(sym, sigStartX, getY(tIdx) + (isSharp ? 2 : -2)); ctx.fillText(sym, sigStartX, getY(bIdx) + (isSharp ? 2 : -2));
                    sigStartX += 15;
                });
            }

            const drawStartX = sigStartX + 40; let noteOffsetX = 0;
            const activeMidiNotes = Array.from(activeNotes.values()).map(n => n.actualNote).sort((a, b) => a - b);
            activeMidiNotes.forEach((midiNote) => {
                const info = getNoteDrawInfo(midiNote, preferFlat), y = getY(info.idx), x = drawStartX + noteOffsetX;
                if (info.acc) { ctx.font = '24px serif'; ctx.fillText(info.acc === '#' ? '♯' : '♭', x - 18, y + (info.acc === '#' ? 2 : -2)); }
                ctx.beginPath(); ctx.ellipse(x, y, 7, 5, -Math.PI / 8, 0, 2 * Math.PI); ctx.fill();
                ctx.beginPath(); ctx.lineWidth = 1.5;
                if (info.idx >= 47) for (let i = 47; i <= info.idx; i += 2) { const ly = getY(i); ctx.moveTo(x - 12, ly); ctx.lineTo(x + 12, ly); }
                if (info.idx <= 23) for (let i = 23; i >= info.idx; i -= 2) { const ly = getY(i); ctx.moveTo(x - 12, ly); ctx.lineTo(x + 12, ly); }
                if (info.idx === 35) { ctx.moveTo(x - 12, y); ctx.lineTo(x + 12, y); }
                ctx.stroke();
                noteOffsetX += 35; if(noteOffsetX > width - drawStartX - 40) noteOffsetX = 0;
            });
        }

        if (document.fonts) { document.fonts.load('48px "Noto Music"').then(() => requestAnimationFrame(drawStaff)); document.fonts.ready.then(() => requestAnimationFrame(drawStaff)); }

        updateSliderUI(); createKeyboard(); resizeCanvas();
    </script>
</body>
</html>
